<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGAN DIGITAL SERVICES</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

header {
    background: #00d4a3;
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
}

.container {
    padding: 20px;
}

.btn {
    background: #25D366;
    color: white;
    padding: 15px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    margin: 15px 0;
    width: 80%;
}

.services {
    margin-top: 20px;
}

.service-box {
    background: #111;
    margin: 10px auto;
    padding: 15px;
    width: 80%;
    border-radius: 10px;
}

input, select {
    width: 80%;
    padding: 12px;
    margin: 8px;
    border-radius: 8px;
    border: none;
}

.order-btn {
    background: orange;
    color: white;
    padding: 15px;
    border: none;
    border-radius: 10px;
    width: 80%;
    font-size: 16px;
}

/* Popup */
.popup {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #111;
    padding: 10px 15px;
    border-radius: 8px;
    display: none;
    font-size: 14px;
}
</style>
</head>

<body>

<header>🚀 LOGAN DIGITAL SERVICES</header>

<div class="container">

<h1>Welcome to My Digital Store</h1>
<p>Fast • Trusted • Affordable</p>

<!-- WhatsApp Button -->
<a href="https://wa.me/231887935222" target="_blank">
<button class="btn">💬 Chat on WhatsApp</button>
</a>

<!-- Visitors -->
<p>👀 Visitors: <span id="visitors">2</span></p>

<!-- Services -->
<div class="services">
    <h2>Our Services</h2>

    <div class="service-box">🔥 Free Fire Top-up</div>
    <div class="service-box">💻 Website Creation</div>
    <div class="service-box">📱 Social Media Boost</div>
</div>

<!-- Order Form -->
<h2>🛒 Place Order</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Your Phone">

<select id="service">
    <option value="">Select Service</option>
    <option value="Free Fire Top-up">Free Fire Top-up</option>
    <option value="Website Creation">Website Creation</option>
    <option value="Social Media Boost">Social Media Boost</option>
</select>

<button class="order-btn" onclick="sendOrder()">Submit Order</button>

</div>

<!-- Fake Popup -->
<div class="popup" id="popup"></div>

<script>
// WhatsApp Order
function sendOrder() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let service = document.getElementById("service").value;

    if(name === "" || phone === "" || service === "") {
        alert("Please fill all fields");
        return;
    }

    let message = `Hello, I want to place an order:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Service: ${service}`;

    let url = `https://wa.me/231887935222?text=${message}`;
    window.open(url, "_blank");
}

// Visitor Counter
let count = 2;

setInterval(() => {
    count += Math.floor(Math.random() * 2) + 1;
    document.getElementById("visitors").innerText = count;
}, 3000);

// Fake Orders Popup
let names = ["John", "Mary", "David", "Samuel", "Blessing"];
let services = ["Free Fire Top-up", "Website Creation", "Social Boost"];

setInterval(() => {
    let popup = document.getElementById("popup");

    let randomName = names[Math.floor(Math.random() * names.length)];
    let randomService = services[Math.floor(Math.random() * services.length)];

    popup.innerText = `${randomName} just ordered ${randomService}`;
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 3000);

}, 5000);
</script>

</body>
</html>
