<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logan Digital Services</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f2027;
    color: white;
}

/* NAVBAR */
.navbar {
    background: #00ffcc;
    color: black;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 20px;
}

/* HERO */
.hero {
    padding: 60px 20px;
    text-align: center;
    animation: fadeIn 1.5s ease-in;
}

.hero h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.hero p {
    color: #ccc;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 15px 25px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.btn:hover {
    background: #1ebe5d;
    transform: scale(1.1);
}

/* SERVICES */
.services {
    padding: 40px 20px;
    text-align: center;
}

.services h2 {
    margin-bottom: 20px;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #111;
    margin: 10px;
    padding: 20px;
    border-radius: 10px;
    width: 200px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    background: #1a1a1a;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    background: #000;
    margin-top: 30px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="navbar">
🚀 LOGAN DIGITAL SERVICES
</div>

<div class="hero">
<h1>Welcome to My Digital Store</h1>
<p>Fast • Trusted • Affordable Services</p>

<a href="https://wa.me/231887935222?text=Hello%20Logan%2C%20I%20need%20your%20service" class="btn">
💬 Chat on WhatsApp
</a>
</div>

<div class="services">
<h2>Our Services</h2>

<div class="cards">
<div class="card">🔥 Free Fire Top-up</div>
<div class="card">💻 Website Creation</div>
<div class="card">📱 Social Media Boost</div>
<div class="card">🎨 Flyer Design</div>
<div class="card">📥 Movie Downloads</div>
</div>
</div>

<div class="footer">
<p>📲 WhatsApp: +231887935222</p>
<p>© 2026 Logan Digital Services</p>
</div>

</body>
</html>
