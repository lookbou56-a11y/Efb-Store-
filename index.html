<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logan Digital Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000428, #004e92);
    color: white;
    text-align: center;
}

/* Header */
header {
    background: #00d4a3;
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
}

/* Container */
.container {
    padding: 20px;
}

/* Animated text */
.animate-text {
    animation: fadeSlide 2s ease-in-out;
}

@keyframes fadeSlide {
    0% {opacity: 0; transform: translateY(-20px);}
    100% {opacity: 1; transform: translateY(0);}
}

.subtitle {
    opacity: 0.8;
}

/* Button */
.btn {
    background: #25D366;
    color: white;
    padding: 15px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    margin: 15px 0;
    width: 80%;
}

/* Glow */
.glow {
    box-shadow: 0 0 10px #25D366, 0 0 20px #25D366;
    transition: 0.3s;
}

.glow:hover {
    transform: scale(1.05);
}

/* Services */
.service-box {
    background: #111;
    margin: 10px auto;
    padding: 15px;
    width: 80%;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(30px);
    transition: 0.5s;
}

/* Inputs */
input, select {
    width: 80%;
    padding: 12px;
    margin: 8px;
    border-radius: 8px;
    border: none;
}

/* Order button */
.order-btn {
    background: orange;
    color: white;
    padding: 15px;
    border: none;
    border-radius: 10px;
    width: 80%;
    font-size: 16px;
}

/* Popup */
.popup {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #111;
    padding: 10px 15px;
    border-radius: 8px;
    display: none;
    font-size: 14px;
}
</style>
</head>

<body>

<header>🚀 LOGAN DIGITAL STORE</header>

<div class="container">

<h1 class="animate-text">Welcome to Logan Digital Store</h1>
<p class="subtitle">Fast • Trusted • Affordable</p>

<a href="https://wa.me/231887935222" target="_blank">
<button class="btn glow">💬 Chat on WhatsApp</button>
</a>

<p>👀 Visitors: <span id="visitors">2</span></p>

<h2>Our Services</h2>

<div class="service-box">🔥 Free Fire Top-up</div>
<div class="service-box">💻 Website Creation</div>
<div class="service-box">📱 Social Media Boost</div>

<h2>🛒 Place Order</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Your Phone">

<select id="service">
    <option value="">Select Service</option>
    <option value="Free Fire Top-up">Free Fire Top-up</option>
    <option value="Website Creation">Website Creation</option>
    <option value="Social Media Boost">Social Media Boost</option>
</select>

<button class="order-btn" onclick="sendOrder()">Submit Order</button>

</div>

<div class="popup" id="popup"></div>

<script>
// WhatsApp Order
function sendOrder() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let service = document.getElementById("service").value;

    if(name === "" || phone === "" || service === "") {
        alert("Please fill all fields");
        return;
    }

    let message = `Hello, I want to place an order:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Service: ${service}`;

    let url = `https://wa.me/231887935222?text=${message}`;
    window.open(url, "_blank");
}

// Visitor Counter
let count = 2;
setInterval(() => {
    count += Math.floor(Math.random() * 2) + 1;
    document.getElementById("visitors").innerText = count;
}, 3000);

// Scroll animation
const boxes = document.querySelectorAll('.service-box');

window.addEventListener('scroll', () => {
    boxes.forEach(box => {
        let position = box.getBoundingClientRect().top;
        let screen = window.innerHeight;

        if(position < screen - 50){
            box.style.opacity = 1;
            box.style.transform = "translateY(0)";
        }
    });
});

// Fake orders popup
let names = ["John", "Mary", "David", "Samuel", "Blessing"];
let services = ["Free Fire Top-up", "Website Creation", "Social Boost"];

setInterval(() => {
    let popup = document.getElementById("popup");

    let randomName = names[Math.floor(Math.random() * names.length)];
    let randomService = services[Math.floor(Math.random() * services.length)];

    popup.innerText = `${randomName} just ordered ${randomService}`;
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 3000);

}, 5000);
</script>

</body>
</html>
